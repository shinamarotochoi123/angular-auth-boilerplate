<h3 class="card-header">Login</h3>
<div class="card-body">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="text" formControlName="email" class="form-control" [class.is-invalid]="submitted && f['email'].errors" />
      <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
        <div *ngIf="f['email'].errors['required']">Email is required</div>
        <div *ngIf="f['email'].errors['email']">Email is invalid</div>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" formControlName="password" class="form-control" [class.is-invalid]="submitted && f['password'].errors" />
      <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
        <div *ngIf="f['password'].errors['required']">Password is required</div>
      </div>
    </div>
    <div class="mb-3">
      <button [disabled]="submitting" class="btn btn-primary">Login</button>
      <a routerLink="../register" class="btn btn-link">Register</a>
      <a routerLink="../forgot-password" class="btn btn-link float-end">Forgot Password?</a>
    </div>
  </form>
</div>
